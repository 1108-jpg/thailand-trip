<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰國旅行助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root { --primary-color: #008080; --bg-color: #f8f9fa; --warm-accent: #ff5722; --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: white; padding: 18px; border-radius: 15px; margin: 12px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 表單樣式 */
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .add-btn { background: var(--primary-color); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        
        /* 清單樣式 */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .list-item:last-child { border-bottom: none; }
        .ig-link { background: var(--ig-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 12px; font-weight: bold; text-decoration: none; }
        .delete-btn { color: #ccc; border: none; background: none; padding: 5px; font-size: 18px; }

        /* 導覽列 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); z-index: 100; }
        .nav-item { border: none; background: none; color: #888; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <!-- 天氣頁面 -->
    <div id="weather" class="page active">
        <h1>🇹🇭 曼谷天氣</h1>
        <div id="current-info" class="card" style="text-align:center; background: linear-gradient(180deg, #e0f2f1, #fff);">載入中...</div>
        <div class="card"><h3>📅 5天預報</h3><div id="forecast-list"></div></div>
    </div>

    <!-- 行程頁面 -->
    <div id="itinerary" class="page">
        <h1>🗓️ 行程安排</h1>
        <div class="card"><strong>DAY 1:</strong> 抵達並入住。</div>
        <div class="card"><strong>DAY 2:</strong> 大皇宮穿搭拍照。</div>
    </div>

    <!-- 清單與靈感頁面 (新功能) -->
    <div id="lists" class="page">
        <h1>📍 清單與靈感</h1>
        <div class="card">
            <h3>➕ 新增靈感</h3>
            <select id="list-type">
                <option value="buy">🛍️ 想要買 (To Buy)</option>
                <option value="go">🚩 想要去/做 (To Go/Do)</option>
            </select>
            <input type="text" id="list-title" placeholder="名稱 (如：手標奶茶、鄭王廟)">
            <input type="url" id="list-url" placeholder="貼上 IG Reels / Threads 連結 (選填)">
            <button class="add-btn" onclick="addListItem()">加入清單</button>
        </div>

        <div class="card">
            <h3>🛍️ 購物清單</h3>
            <div id="buy-list">尚無紀錄</div>
        </div>

        <div class="card">
            <h3>🚩 必去清單</h3>
            <div id="go-list">尚無紀錄</div>
        </div>
    </div>

    <!-- 理財頁面 -->
    <div id="finance" class="page">
        <h1>💰 分帳紀錄</h1>
        <div class="card">
            <h3>➕ 新增支出</h3>
            <input type="text" id="pay-desc" placeholder="項目">
            <input type="number" id="pay-amount" placeholder="金額 (THB)">
            <select id="payer">
                <option value="Ada">Ada 墊付</option>
                <option value="Cindy">Cindy 墊付</option>
                <option value="Ling">Ling 墊付</option>
            </select>
            <button class="add-btn" onclick="addPayment()">記錄分帳</button>
        </div>
        <div class="card"><div id="pay-records"></div></div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('weather')"><span>🌤️</span>天氣</button>
        <button class="nav-item" onclick="showPage('itinerary')"><span>🗓️</span>行程</button>
        <button class="nav-item" onclick="showPage('lists')"><span>📌</span>清單</button>
        <button class="nav-item" onclick="showPage('finance')"><span>💰</span>分帳</button>
    </nav>

    <script>
        const apiKey = '60cc6ca7af6352b8d7a184999d857f16';
        let tripLists = JSON.parse(localStorage.getItem('trip_lists')) || { buy: [], go: [] };
        let payments = JSON.parse(localStorage.getItem('trip_payments')) || [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 清單功能
        function addListItem() {
            const type = document.getElementById('list-type').value;
            const title = document.getElementById('list-title').value;
            const url = document.getElementById('list-url').value;
            if (!title) return;

            tripLists[type].push({ title, url, id: Date.now() });
            localStorage.setItem('trip_lists', JSON.stringify(tripLists));
            renderLists();
            document.getElementById('list-title').value = '';
            document.getElementById('list-url').value = '';
        }

        function deleteItem(type, id) {
            tripLists[type] = tripLists[type].filter(item => item.id !== id);
            localStorage.setItem('trip_lists', JSON.stringify(tripLists));
            renderLists();
        }

        function renderLists() {
            ['buy', 'go'].forEach(type => {
                const el = document.getElementById(`${type}-list`);
                if (tripLists[type].length === 0) { el.innerHTML = '尚無紀錄'; return; }
                el.innerHTML = tripLists[type].map(item => `
                    <div class="list-item">
                        <div>
                            <span>${item.title}</span>
                            ${item.url ? `<br><a href="${item.url}" target="_blank" class="ig-link">🔗 查看 IG/Threads</a>` : ''}
                        </div>
                        <button class="delete-btn" onclick="deleteItem('${type}', ${item.id})">×</button>
                    </div>
                `).join('');
            });
        }

        // 分帳功能
        function addPayment() {
            const desc = document.getElementById('pay-desc').value;
            const amount = document.getElementById('pay-amount').value;
            const payer = document.getElementById('payer').value;
            if (!desc || !amount) return;

            payments.unshift({ desc, amount, payer, per: (amount/3).toFixed(1) });
            localStorage.setItem('trip_payments', JSON.stringify(payments));
            renderPayments();
            document.getElementById('pay-desc').value = '';
            document.getElementById('pay-amount').value = '';
        }

        function renderPayments() {
            const el = document.getElementById('pay-records');
            el.innerHTML = payments.map(p => `
                <div style="border-bottom:1px solid #eee; padding:10px 0;">
                    <strong>${p.desc}</strong>: ${p.amount} THB (${p.payer}付)<br>
                    <small style="color:#666">Ada/Cindy/Ling 每人: ${p.per} THB</small>
                </div>
            `).join('');
        }

        // 天氣 API
        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Bangkok&appid=${apiKey}&units=metric&lang=zh_tw`);
                const data = await res.json();
                document.getElementById('current-info').innerHTML = `<h2 style="color:var(--warm-accent); margin:0;">${Math.round(data.main.temp)}°C</h2><p style="margin:5px 0;">${data.weather[0].description}</p>`;
                
                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=Bangkok&appid=${apiKey}&units=metric&lang=zh_tw`);
                const fData = await fRes.json();
                document.getElementById('forecast-list').innerHTML = fData.list.filter(i => i.dt_txt.includes("12:00:00")).map(d => `
                    <div class="forecast-item">
                        <span>${new Date(d.dt*1000).toLocaleDateString('zh-HK',{weekday:'short',day:'numeric'})}</span>
                        <span>${d.weather[0].description}</span>
                        <span style="font-weight:bold; color:var(--warm-accent)">${Math.round(d.main.temp)}°C</span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        fetchWeather();
        renderLists();
        renderPayments();
    </script>
</body>
</html>
