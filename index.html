<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai 🌸🌿</title>
    <link class="js-meta-icon" rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#f8d7ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=700;900&family=Plus+Jakarta+Sans:wght=700;800&display=swap');

        :root { 
            --pink: #ff9ff3;
            --yellow: #feca57;
            --blue: #48dbfb;
            --green: #1dd1a1;
            --coral: #ff6b6b;
            --black: #2d3436;
            --white: #ffffff;
            --bg-purple: #f8d7ff;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background: var(--bg-purple);
            color: var(--black);
            margin: 0; 
            padding-bottom: 40px; 
            background-image: radial-gradient(var(--pink) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 頂部固定綜合導航區塊 */
        .top-header-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--white);
            border-bottom: 4px solid var(--black);
            z-index: 2000;
            box-shadow: 0 6px 0px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* 熱帶漸層霓虹 Banner */
        .app-banner {
            height: 48px;
            border-bottom: 3px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--white);
            background: linear-gradient(135deg, #ff9ff3 0%, #ff6b6b 50%, #feca57 100%);
            text-shadow: 2px 2px 0px var(--black), -1px -1px 0px var(--black), 1px -1px 0px var(--black), -1px 1px 0px var(--black);
            box-shadow: inset 0 -2px 0px rgba(0,0,0,0.1);
        }

        /* 檔案夾風格單排 4 欄控制板 */
        .nav-bar { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            padding: 8px 8px;
            background: #fafafa;
            box-sizing: border-box;
        }

        /* Neobrutalism 3D 檔案夾式梯形紙頁籤 */
        .nav-item { 
            border: 2px solid var(--black); 
            background: var(--white); 
            color: var(--black); 
            font-size: 11px; 
            font-weight: 900; 
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.08s ease;
            box-shadow: 2.5px 2.5px 0px var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-sizing: border-box;
            user-select: none;
            transform: perspective(30px) rotateX(12deg);
            transform-origin: bottom;
        }
        .nav-item span { font-size: 16px; }

        /* 點擊及啟用狀態 */
        .nav-item.active { 
            color: var(--white); 
            background: linear-gradient(135deg, #ff9ff3 0%, #ff6b6b 50%, #feca57 100%);
            text-shadow: 1px 1px 0px var(--black), -0.5px -0.5px 0px var(--black), 0.5px -0.5px 0px var(--black), -0.5px 0.5px 0px var(--black);
            box-shadow: 0.5px 0.5px 0px var(--black);
            transform: perspective(30px) rotateX(12deg) translate(2px, 2px);
        }

        /* 頁面容器 */
        .page { 
            display: none !important; 
            padding: 140px 20px 25px 20px; 
            animation: popIn 0.3s ease-out; 
        }
        .page.active { 
            display: block !important; 
        }
        @keyframes popIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h1 { 
            font-size: 24px; font-weight: 900; color: var(--black);
            text-shadow: 2px 2px 0px var(--white), 3px 3px 0px var(--blue);
            margin-bottom: 15px; text-align: center;
            margin-top: 5px;
        }

        .card { 
            background: var(--white); 
            border: 3px solid var(--black);
            border-radius: 16px;
            padding: 16px; 
            margin: 12px 0; 
            position: relative;
        }

        .card.clickable-accordion {
            cursor: pointer;
            box-shadow: 5px 5px 0px var(--black);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .accordion-header { display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .accordion-header-left { display: flex; align-items: center; gap: 10px; }
        .accordion-title { font-weight: 900; font-size: 15px; }
        .accordion-arrow { font-size: 12px; transition: transform 0.2s; font-weight: 900; }
        .accordion-content { display: none; margin-top: 12px; padding-top: 12px; border-top: 2px dashed #eee; }
        
        .card.expanded .accordion-arrow { transform: rotate(180deg); }
        .card.expanded .accordion-content { display: block; }

        .iti-timeline-item { margin-bottom: 12px; padding-left: 10px; border-left: 3px solid var(--pink); font-size: 13px; line-height: 1.5; font-weight: 700; }
        .iti-time { font-weight: 900; color: var(--coral); font-size: 12px; background: #fff5f5; padding: 1px 5px; border-radius: 4px; border: 1px solid var(--coral); display: inline-block; margin-bottom: 2px; }
        .iti-link { color: #0984e3; text-decoration: underline; font-weight: 900; }

        .mini-ticket { padding: 12px; margin: 8px 0; border-radius: 12px; border-width: 2px; }
        .mini-ticket .ticket-cutout { margin-top: 8px; padding-top: 8px; border-top: 2px dashed var(--black); }

        .sticker-label {
            display: inline-block; background: var(--yellow); border: 2px solid var(--black);
            padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 900;
            box-shadow: 1.5px 1.5px 0px var(--black); flex-shrink: 0;
        }

        .add-btn { 
            background: var(--green); color: var(--black); border: 3px solid var(--black); 
            width: 100%; padding: 12px; border-radius: 50px; font-weight: 900; font-size: 16px;
            box-shadow: 3px 3px 0px var(--black); cursor: pointer; transition: 0.1s;
        }

        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; background: #fff; 
            border: 3px solid var(--black); border-radius: 12px; 
            font-family: inherit; font-weight: 700; box-sizing: border-box;
        }
        
        .todo-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 2px dashed #eee; cursor: pointer; }
        .todo-checkbox { width: 22px; height: 22px; border: 2px solid var(--black); border-radius: 6px; margin-right: 12px; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; }
        .todo-item.checked .todo-checkbox { background: var(--green); }
        .todo-text { font-weight: 700; font-size: 14px; }
        .todo-item.checked .todo-text { text-decoration: line-through; opacity: 0.5; }

        .baggage-badge-box { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .bag-badge { background: #fffde7; border: 2px solid var(--black); border-radius: 10px; padding: 4px 8px; font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 3px; box-shadow: 1.5px 1.5px 0px var(--black); }
    </style>
</head>
<body>

        <div class="app-banner">✨ THAI ADVENTURE 🌸</div>

            <div id="mini-weather-display">☀️ 曼谷：熱情陽光奔放中...</div>
        </div>
        <nav class="nav-bar">
            <button id="btn-flights" class="nav-item active" onclick="showPage('flights')"><span>✈️</span>航班</button>
            <button id="btn-itinerary" class="nav-item" onclick="showPage('itinerary')"><span>🗺️</span>行程</button>
            <button id="btn-checklist" class="nav-item" onclick="showPage('checklist')"><span>✅</span>檢查</button>
            <button id="btn-finance" class="nav-item" onclick="showPage('finance')"><span>💰</span>分帳</button>
        </nav>
    </div>
