<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰國貼紙冒險 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap');

        :root { 
            --pink: #ff9ff3;
            --yellow: #feca57;
            --blue: #48dbfb;
            --green: #1dd1a1;
            --coral: #ff6b6b;
            --black: #2d3436;
            --white: #ffffff;
            --bg-purple: #f8d7ff;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background: var(--bg-purple);
            color: var(--black);
            margin: 0; 
            padding-bottom: 120px;
            /* 背景加上可愛的小點點裝飾 */
            background-image: radial-gradient(var(--pink) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
        }

        .page { display: none; padding: 25px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .page.active { display: block; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { 
            font-size: 32px; font-weight: 900; color: var(--black);
            text-shadow: 3px 3px 0px var(--white), 6px 6px 0px var(--blue);
            margin-bottom: 20px; text-align: center;
        }

        /* 貼紙感卡片設計 */
        .card { 
            background: var(--white); 
            border: 3px solid var(--black);
            border-radius: 20px;
            padding: 20px; 
            margin: 15px 0; 
            box-shadow: 6px 6px 0px var(--black); /* 復古硬陰影 */
            position: relative;
        }

        /* 像圖中標籤的樣式 */
        .sticker-label {
            display: inline-block;
            background: var(--yellow);
            border: 2px solid var(--black);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 8px;
            box-shadow: 2px 2px 0px var(--black);
        }

        /* 輸入框樣式 */
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #fff; 
            border: 3px solid var(--black);
            border-radius: 12px; 
            font-family: inherit; font-weight: 700;
            box-sizing: border-box;
        }
        
        /* 充滿活力的按鈕 */
        .add-btn { 
            background: var(--green); 
            color: var(--black); border: 3px solid var(--black); 
            width: 100%; padding: 15px; 
            border-radius: 50px; font-weight: 900; font-size: 18px;
            box-shadow: 4px 4px 0px var(--black);
            cursor: pointer; transition: 0.1s;
            margin-top: 10px;
        }
        .add-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--black); }

        /* 導覽列：像一排貼紙 */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 5%; width: 90%; height: 80px; 
            background: var(--white); 
            border: 4px solid var(--black);
            border-radius: 100px;
            display: flex; justify-content: space-around; align-items: center; 
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .nav-item { 
            border: none; background: none; color: var(--black); 
            font-size: 12px; font-weight: 900; display: flex; flex-direction: column; align-items: center; 
        }
        .nav-item.active { color: var(--coral); transform: scale(1.1) rotate(-5deg); }
        .nav-item span { font-size: 28px; filter: drop-shadow(2px 2px 0px #000); }

        /* 天氣大圖示 */
        .big-icon { font-size: 60px; margin: 10px 0; filter: drop-shadow(4px 4px 0px var(--black)); }
        .temp-val { font-size: 48px; font-weight: 900; -webkit-text-stroke: 1.5px var(--black); color: var(--yellow); }

        /* 列表刪除鈕 */
        .delete-btn { font-size: 24px; border: none; background: none; cursor: pointer; }

        .ig-link { 
            display: inline-block; margin-top: 10px;
            background: var(--pink); border: 2px solid var(--black);
            color: var(--black); font-size: 12px; font-weight: 900; 
            padding: 5px 15px; border-radius: 50px; text-decoration: none;
            box-shadow: 2px 2px 0px var(--black);
        }
    </style>
</head>
<body>

    <!-- 天氣頁面 -->
    <div id="weather" class="page active">
        <h1>🌞 天氣預報</h1>
        <div id="current-info" class="card" style="text-align:center;">
            <div class="sticker-label" style="background:var(--blue); color:white;">BANGKOK TODAY</div>
            <div class="big-icon">🌼</div>
            <div class="temp-val">--°C</div>
            <div style="font-weight:900; margin-top:10px;">今天也是開心的一天！</div>
        </div>
        <div class="card">
            <h3>✨ 未來預報</h3>
            <div id="forecast-list"></div>
        </div>
    </div>

    <!-- 行程頁面 -->
    <div id="itinerary" class="page">
        <h1>🎒 冒險行程</h1>
        <div class="card">
            <div class="sticker-label">DAY 01</div>
            <div style="font-weight:900; font-size:18px;">🌈 抵達泰國 & 快樂晚餐</div>
            <div style="font-size:14px; margin-top:5px; opacity:0.8;">準備開啟瘋狂模式！</div>
        </div>
        <div class="card">
            <div class="sticker-label" style="background:var(--pink)">DAY 02</div>
            <div style="font-weight:900; font-size:18px;">🛕 曼谷探險記</div>
        </div>
        <div class="card">
            <div class="sticker-label" style="background:var(--green)">DAY 03</div>
            <div style="font-weight:900; font-size:18px;">🛒 市集大掃貨</div>
        </div>
    </div>

    <!-- 清單頁面 -->
    <div id="lists" class="page">
        <h1>👀 靈感筆記</h1>
        <div class="card">
            <div class="sticker-label" style="background:var(--blue)">NEW IDEA</div>
            <select id="list-type">
                <option value="buy">🛍️ 想買的東西</option>
                <option value="go">📍 必去的地方</option>
            </select>
            <input type="text" id="list-title" placeholder="寫下妳的發現...">
            <input type="url" id="list-url" placeholder="🔗 連結 (IG/Threads)">
            <button class="add-btn" onclick="addListItem()">貼上靈感貼紙 ✨</button>
        </div>
        <div id="buy-list-container"></div>
        <div id="go-list-container"></div>
    </div>

    <!-- 分帳頁面 -->
    <div id="finance" class="page">
        <h1>💸 誰付了錢</h1>
        <div class="card">
            <div class="sticker-label" style="background:var(--coral); color:white;">PAYMENT</div>
            <input type="text" id="pay-desc" placeholder="吃了什麼好料？">
            <input type="number" id="pay-amount" placeholder="多少泰銖？">
            <select id="payer">
                <option value="Ada">🥰 Ada 付的</option>
                <option value="Cindy">🤪 Cindy 付的</option>
                <option value="Ling">😇 Ling 付的</option>
            </select>
            <button class="add-btn" style="background:var(--yellow)" onclick="addPayment()">算算每人多少 💰</button>
        </div>
        <div class="card"><h3>📑 小帳本</h3><div id="pay-records"></div></div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('weather')"><span>☀️</span>天氣</button>
        <button class="nav-item" onclick="showPage('itinerary')"><span>🗺️</span>行程</button>
        <button class="nav-item" onclick="showPage('lists')"><span>🎨</span>靈感</button>
        <button class="nav-item" onclick="showPage('finance')"><span>💰</span>分帳</button>
    </nav>

    <script>
        const apiKey = '60cc6ca7af6352b8d7a184999d857f16';
        let tripLists = JSON.parse(localStorage.getItem('trip_lists')) || { buy: [], go: [] };
        let payments = JSON.parse(localStorage.getItem('trip_payments')) || [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            window.scrollTo(0,0);
        }

        function addListItem() {
            const title = document.getElementById('list-title').value;
            if (!title) return;
            const type = document.getElementById('list-type').value;
            tripLists[type].push({ title, url: document.getElementById('list-url').value, id: Date.now() });
            localStorage.setItem('trip_lists', JSON.stringify(tripLists));
            renderLists();
            document.getElementById('list-title').value = '';
            document.getElementById('list-url').value = '';
        }

        function renderLists() {
            const configs = { buy: { el: 'buy-list-container', t: '🛍️ 購物清單' }, go: { el: 'go-list-container', t: '📍 探索目標' } };
            for (let k in configs) {
                const list = tripLists[k];
                document.getElementById(configs[k].el).innerHTML = list.length === 0 ? '' : `
                    <div class="card">
                        <h3>${configs[k].t}</h3>
                        ${list.map(i => `
                            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:2px dashed #eee;">
                                <div><b>${i.title}</b><br>${i.url ? `<a href="${i.url}" target="_blank" class="ig-link">LOOK! 📸</a>` : ''}</div>
                                <button class="delete-btn" onclick="deleteItem('${k}', ${i.id})">❌</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        function deleteItem(type, id) {
            tripLists[type] = tripLists[type].filter(i => i.id !== id);
            localStorage.setItem('trip_lists', JSON.stringify(tripLists));
            renderLists();
        }

        function addPayment() {
            const desc = document.getElementById('pay-desc').value;
            const amount = document.getElementById('pay-amount').value;
            if (!desc || !amount) return;
            payments.unshift({ desc, amount, payer: document.getElementById('payer').value, per: (amount/3).toFixed(0) });
            localStorage.setItem('trip_payments', JSON.stringify(payments));
            renderPayments();
            document.getElementById('pay-desc').value = '';
            document.getElementById('pay-amount').value = '';
        }

        function renderPayments() {
            const el = document.getElementById('pay-records');
            el.innerHTML = payments.map(p => `
                <div style="padding:10px 0; border-bottom:2px dashed #eee;">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-weight:900;">🍭 ${p.desc}</span>
                        <span style="color:var(--coral); font-weight:900;">${p.amount}฿</span>
                    </div>
                    <div style="font-size:12px; font-weight:700; opacity:0.7;">${p.payer} 買單 ➔ 每人 ${p.per}฿</div>
                </div>
            `).join('');
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Bangkok&appid=${apiKey}&units=metric`);
                const data = await res.json();
                document.getElementById('current-info').innerHTML = `
                    <div class="sticker-label" style="background:var(--blue); color:white;">BANGKOK TODAY</div>
                    <div class="big-icon">😎</div>
                    <div class="temp-val">${Math.round(data.main.temp)}°C</div>
                    <div style="font-weight:900; margin-top:10px; text-transform:uppercase;">${data.weather[0].description}</div>
                `;
                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=Bangkok&appid=${apiKey}&units=metric`);
                const fData = await fRes.json();
                document.getElementById('forecast-list').innerHTML = fData.list.filter(i => i.dt_txt.includes("12:00:00")).map(d => `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; font-weight:900;">
                        <span>${new Date(d.dt*1000).toLocaleDateString('zh-HK',{weekday:'short'})}</span>
                        <span style="color:var(--pink)">${Math.round(d.main.temp)}°C</span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        fetchWeather(); renderLists(); renderPayments();
    </script>
</body>
</html>
